events { worker_connections 1024; }

http {
    # Cache zone used only for safe GETs on rendered content.
    proxy_cache_path /var/cache/nginx keys_zone=ren:10m levels=1:2 max_size=100m inactive=5m use_temp_path=off;

    upstream ui             { server ui-runtime:80;     }
    upstream gateway        { server api-gateway:3000;  }
    upstream bus            { server command-bus:4000;  }
    upstream gen_jinja      { server gen-jinja:6001;    }
    upstream gen_twig       { server gen-twig:6002;     }
    upstream gen_handlebars { server gen-handlebars:6003; }

    server {
        listen 80;
        server_name _;

        # ---- UI ----
        location / {
            proxy_pass http://ui;
            proxy_set_header Host $host;
        }

        # ---- API ----
        location /api/ {
            proxy_pass http://gateway;
            proxy_set_header Host $host;
            proxy_set_header Authorization $http_authorization;
        }
        location = /schemas       { proxy_pass http://gateway; }
        location ~ ^/schemas/     { proxy_pass http://gateway; }
        location = /mime-types    { proxy_pass http://gateway; }
        location = /auth/login    { proxy_pass http://gateway; }
        location = /audit         { proxy_pass http://gateway; }

        # ---- Command bus ----
        location /commands/ { proxy_pass http://gateway; }
        location /bus/      { proxy_pass http://bus/;    }

        # ---- Generators (direct) ----
        # /render/gen-jinja/:id   etc — CDN picks the right upstream.
        location ~ ^/render/gen-jinja/(.+)$ {
            proxy_method POST;
            proxy_pass http://gen_jinja/render/$1;
        }
        location ~ ^/render/gen-twig/(.+)$ {
            proxy_method POST;
            proxy_pass http://gen_twig/render/$1;
        }
        location ~ ^/render/gen-handlebars/(.+)$ {
            proxy_method POST;
            proxy_pass http://gen_handlebars/render/$1;
        }

        # ---- Cached preview endpoints ----
        location ~ ^/preview/gen-jinja/(.+)$ {
            proxy_pass http://gen_jinja/preview/$1;
            proxy_cache ren;
            proxy_cache_valid 200 60s;
            add_header X-Cache-Status $upstream_cache_status;
        }
        location ~ ^/preview/gen-handlebars/(.+)$ {
            proxy_pass http://gen_handlebars/preview/$1;
            proxy_cache ren;
            proxy_cache_valid 200 60s;
            add_header X-Cache-Status $upstream_cache_status;
        }

        location = /health {
            return 200 '{"ok":true,"service":"cdn"}';
            default_type application/json;
        }
    }
}
