# SCENARIO: storage-mirror — primary backend declared, mirrors listable
# TYPE: api

CONFIG[3]{key, value}:
  base_url, http://localhost:3000
  timeout_ms, 5000
  auth, bearer:${ADMIN_TOKEN}

